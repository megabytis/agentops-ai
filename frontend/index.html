<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentOps AI - Repository Analysis</title>
    <meta name="description" content="AI-powered GitHub repository analysis tool.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
    <!-- Marked.js for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify for sanitizing HTML from markdown -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
    <div class="background-elements">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <main class="container">
        <header class="header">
            <h1 class="logo">AgentOps <span>AI</span></h1>
            <p class="subtitle">Automated Code Intelligence & Repository Analysis</p>
        </header>

        <section class="input-section glass-panel">
            <form id="analyze-form">
                <div class="input-group">
                    <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    <input type="url" id="repo-url" placeholder="https://github.com/username/repository" required autocomplete="off">
                    <button type="submit" id="submit-btn">
                        <span class="btn-text">Analyze</span>
                        <div class="spinner"></div>
                    </button>
                </div>
            </form>
            <div id="error-message" class="error-message"></div>
        </section>

        <section id="results-section" class="results-section hidden">
            <div class="result-card glass-panel" id="summary-card">
                <h2><span class="icon">✨</span> Summary</h2>
                <div id="summary-content" class="content-box"></div>
            </div>

            <div class="result-card glass-panel" id="improvements-card">
                <h2><span class="icon">🚀</span> Suggested Improvements</h2>
                <ul id="improvements-content" class="content-box list"></ul>
            </div>

            <div class="result-card glass-panel" id="readme-card">
                <h2><span class="icon">📄</span> Generated README</h2>
                <div id="readme-content" class="content-box markdown-body"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
